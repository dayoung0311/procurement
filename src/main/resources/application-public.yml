server:
  servlet:
    context-path: /procurement

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI}

  http:
    serviceclient:
       bbd-user-service:
        base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081/user}
       bbd-item-service:
        base-url: ${ITEM_SERVICE_BASE_URL:http://localhost:8082/item}
        connect-timeout: 2s
        read-timeout: 5s
       bbd-inventory-service:
         base-url: ${INVENTORY_SERVICE_BASE_URL:http://localhost:8083/inventory}
       bbd-procurement-service:
        base-url: ${PROCUREMENT_SERVICE_BASE_URL:http://localhost:8084/procurement}
       bbd-sales-service:
        base-url: ${SALES_SERVICE_BASE_URL:http://localhost:8085/sales}
        connect-timeout: 2s
        read-timeout: 5s

    data:
      redis:
        host: ${REDIS_HOST:localhost}
        port: ${REDIS_PORT:6379}

  bbd:
    security:
      enabled: true
      permit-all-paths:
        - /actuator/health
        - /actuator/health/**
        - /swagger-ui/**
        - /swagger-ui.html
        - /v3/api-docs/**

  application:
    name: procurement

  threads:
    virtual:
      enabled: true # Java 21 Virtual Thread 사용

  datasource:
    url: ${DB_ENDPOINT}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        jdbc:
          time_zone: Asia/Seoul

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: kafka.inwoohub.com:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: procurement-purchase
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# Swagger
springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    url: /procurement/v3/api-docs
    config-url: /procurement/v3/api-docs/swagger-config

item:
  base-url: ${ITEM_SERVICE_BASE_URL:http://item:8080/item}

sales:
  base-url: ${SALES_SERVICE_BASE_URL:http://sales:8080/sales}

logging:
  level:
    root: info
    org.hibernate.SQL: warn
    org.hibernate.orm.jdbc.bind: warn

bbd:
  security:
    enabled: true
    permit-all-paths:
      - /health
      - /health/**
      - /actuator/health
      - /actuator/health/**
      - /swagger-ui/**
      - /swagger-ui.html
      - /v3/api-docs/**
