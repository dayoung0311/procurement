server:
  servlet:
    context-path: /procurement

spring:
  application:
    name: procurement

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${DB_ENDPOINT}
    username: ${DB_NAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        show_sql: false
        jdbc:
          time_zone: Asia/Seoul

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka.inwoohub.com:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: alpha
    config-url: /procurement/v3/api-docs/swagger-config
    url: /procurement/v3/api-docs

item:
  base-url: ${ITEM_BASE_URL:http://bbd-item:8080/item}

sales:
  base-url: ${SALES_BASE_URL:http://bbd-sales:8080/sales}